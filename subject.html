<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Selection</title>
    <link rel="stylesheet" href="subject.css">
</head>

<body>
<header>
  <div class="navbar">
    <div class="logo">AI Engineering Hub</div>
    <div class="nav-links">
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="subject.html">Subjects</a></li>
        <li><a href="home.html">AI Quiz</a></li>
        <li><a href="#dashboard">Dashboard</a></li>
        <li><a href="#assistant">AI Assistant</a></li>
      </ul>
    </div>
  </div>
</header>
      <div class="container">
        <h1>Personalized Learning Recommendation</h1>

        <div class="form-section">
            <!-- Educational Level -->
            <label for="level">Select Your Educational Level:</label>
            <select id="level">
            <option value="">--Select--</option>
            <option value="1-5">Class 1-5</option>
            <option value="6-10">Class 6-10</option>
            <option value="+1">+1 (Intermediate 1st Year)</option>
            <option value="+2">+2 (Intermediate 2nd Year)</option>
            <option value="undergraduate">Undergraduate</option>
            <option value="postgraduate">Postgraduate</option>
        </select>

            <!-- Goal -->
            <label for="goal">Select Your Goal:</label>
            <select id="goal">
            <option value="">--Select--</option>
            <option value="improve_grades">Improve Grades</option>
            <option value="learn_skills">Learn New Skills</option>
            <option value="competitive_exam">Prepare for Competitive Exams</option>
            <option value="career_guidance">Career Guidance</option>
        </select>

            <!-- Area of Interest -->
            <label for="interest">Select Area of Interest:</label>
            <select id="interest">
            <option value="">--Select--</option>
            <option value="math">Mathematics</option>
            <option value="science">Science</option>
            <option value="computer">Computer Science</option>
            <option value="english">English</option>
            <option value="history">History</option>
            <option value="arts">Arts</option>
        </select>

            <button onclick="getRecommendations()">Get Recommendations</button>
        </div>

        <div class="result-section">
            <h2>Recommended Courses / Resources:</h2>
            <ul id="recommendations"></ul>
        </div>
    </div>
    <script src="subject.js"></script>
</body>

</html>
