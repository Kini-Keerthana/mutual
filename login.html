<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website with Login Modal</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">MyWebsite</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Subjects</a></li>
            <li><a href="#">AI Quiz</a></li>
            <li><a href="#">Dashboard</a></li>
            <li><button id="open-login" class="nav-btn">Login / Sign Up</button></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <h1>Welcome to MyWebsite</h1>
        <p>Explore educational resources, quizzes, and dashboards!</p>
        <button id="open-login-2" class="main-btn">Login / Sign Up</button>
    </div>

    <!-- Overlay Modal -->
    <div class="overlay hidden" id="overlay">
        <div class="modal">
            <span class="close-btn" id="close-btn">&times;</span>

            <div class="form-toggle">
                <button id="login-toggle" class="active">Login</button>
                <button id="signup-toggle">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <h2>Login</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="hidden">
                <h2>Create Account</h2>
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
